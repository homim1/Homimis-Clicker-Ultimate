<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход и Регистрация</title>
    <link rel="stylesheet" href="logincss.css">
</head>
<body>
    <div class="container">
        <!-- Форма регистрации -->
        <div id="register-form">
            <h2>Регистрация</h2>
            <input type="text" id="reg-login" placeholder="Логин">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <button onclick="register()">Создать аккаунт</button>
            <p>Уже есть аккаунт? <span onclick="toggleForm()">Войти</span></p>
        </div>

        <!-- Форма входа -->
        <div id="login-form" style="display:none;">
            <h2>Вход</h2>
            <input type="text" id="log-login" placeholder="Логин">
            <input type="password" id="log-pass" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <p>Нет аккаунта? <span onclick="toggleForm()">Зарегистрироваться</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
