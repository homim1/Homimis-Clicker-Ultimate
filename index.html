<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Homimis Clicker: Ultimate</title>
<link rel="stylesheet" href="grid.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<button id="logout-btn" style="position:absolute; top:10px; right:10px;"></button>

<div class="content">

<div class="container">
<h2>Homimis Clicker</h2>

<div class="stat">Клики: <b id="clicks">0</b></div>
<div class="stat">Сила клика: <b id="cpc">1</b> (x<span id="mult-val">1</span>)</div>
<div class="stat">Автоклик: <b id="auto-val">0</b> сек.</div>

<div class="shop">
<p><b>Магазин:</b></p>

<button id="buy-power" class="shop-btn">
Улучшить клик (+1) — Цена: 100
</button>

<button id="buy-auto" class="shop-btn">
Купить Автоклик (+1/сек) — Цена: 500
</button>

<button id="btn-rebirth" class="shop-btn rebirth">
ПЕРЕРОЖДЕНИЕ (x2 доход) — Цена: 2000
</button>

</div>

<button id="btn-main">КЛИКАТЬ!</button>
</div>

<div class="leaderboard container">
<h1>Leaderboard</h1>
</div>

</div>

<script>

const currentUser = localStorage.getItem("currentUser");

if(!currentUser){
location.href = "login.html";
}

document.getElementById("logout-btn").innerText =
"Выйти (" + currentUser + ")";

const userKey = "clicker_data_" + currentUser;

let savedData = JSON.parse(localStorage.getItem(userKey)) || {
score:0,
power:1,
auto:0,
mult:1
};

let score = Number(savedData.score);
let power = Number(savedData.power);
let auto = Number(savedData.auto);
let mult = Number(savedData.mult);

const display = document.getElementById("clicks");
const powerDisplay = document.getElementById("cpc");
const autoDisplay = document.getElementById("auto-val");
const multDisplay = document.getElementById("mult-val");
const leaderboardDiv = document.querySelector(".leaderboard");

function updateUI(){

display.innerText = Math.floor(score);
powerDisplay.innerText = power;
autoDisplay.innerText = auto;
multDisplay.innerText = mult;

const data = {score,power,auto,mult};
localStorage.setItem(userKey,JSON.stringify(data));

}

function renderLeaderboard(){

leaderboardDiv.innerHTML="<h1>Leaderboard</h1>";

let players=[];

for(let i=0;i<localStorage.length;i++){

let key=localStorage.key(i);

if(key.startsWith("clicker_data_")){

let name=key.replace("clicker_data_","");
let data=JSON.parse(localStorage.getItem(key));

players.push({
name:name,
score:data.score
});

}

}

players.sort((a,b)=>b.score-a.score);

players.slice(0,10).forEach((p,i)=>{

const div=document.createElement("div");

if(p.name===currentUser){
div.style.color="gold";
div.style.fontWeight="bold";
}

div.innerHTML=`${i+1}. ${p.name} — ${Math.floor(p.score)}`;

leaderboardDiv.appendChild(div);

});

}

function logout(){
localStorage.removeItem("currentUser");
location.href="login.html";
}

document.getElementById("logout-btn").onclick=logout;

document.getElementById("btn-main").onclick=()=>{

score += power * mult;
updateUI();

};

document.getElementById("buy-power").onclick=()=>{

if(score>=100){
score-=100;
power++;
updateUI();
}else{
alert("Недостаточно кликов");
}

};

document.getElementById("buy-auto").onclick=()=>{

if(score>=500){
score-=500;
auto++;
updateUI();
}else{
alert("Недостаточно кликов");
}

};

document.getElementById("btn-rebirth").onclick=()=>{

if(score>=2000){

if(confirm("Сбросить прогресс ради x2?")){

score=0;
power=1;
auto=0;
mult*=2;

updateUI();

}

}else{
alert("Нужно 2000 кликов");
}

};

setInterval(()=>{

if(auto>0){

score += auto * mult;
updateUI();

}

},1000);

setInterval(renderLeaderboard,3000);

updateUI();
renderLeaderboard();

</script>

</body>
</html>
