<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Homimis Clicker: Ultimate</title>
<link rel="stylesheet" href="grid.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<button id="logout-btn" style="position:absolute; top:10px; right:10px;"></button>

<div class="content">

<div class="container">
<h2>Homimis Clicker</h2>

<div class="stat">Клики: <b id="clicks">0</b></div>
<div class="stat">Сила клика: <b id="cpc">1</b> (x<span id="mult-val">1</span>)</div>
<div class="stat">Автоклик: <b id="auto-val">0</b> сек.</div>

<div class="shop">
<p><b>Магазин:</b></p>

<button id="buy-power" class="shop-btn">
Улучшить клик (+1) — Цена: 100
</button>

<button id="buy-auto" class="shop-btn">
Купить Автоклик (+1/сек) — Цена: 500
</button>

</div>

<button id="btn-main">КЛИКАТЬ!</button>
</div>

<div class="leaderboard container">
<h1>Leaderboard</h1>
</div>

</div>

<script>
const currentUser = localStorage.getItem('currentUser');

if (!currentUser) {
    window.location.href = 'login.html';
}

document.getElementById("logout-btn").innerText =
"Выйти (" + currentUser + ")";

const userKey = `clicker_data_${currentUser}`;

let savedData = JSON.parse(localStorage.getItem(userKey)) || {
    score: 0,
    power: 1,
    auto: 0,
    powerPrice: 100,
    autoPrice: 500
};

let score = Number(savedData.score);
let power = Number(savedData.power);
let auto = Number(savedData.auto);
let powerPrice = savedData.powerPrice || 100;
let autoPrice = savedData.autoPrice || 500;

const display = document.getElementById('clicks');
const powerDisplay = document.getElementById('cpc');
const autoDisplay = document.getElementById('auto-val');
const leaderboardDiv = document.querySelector('.leaderboard');

function updateUI() {

if (!powerPrice || powerPrice < 1) powerPrice = 100;
if (!autoPrice || autoPrice < 1) autoPrice = 500;

display.innerText = Math.floor(score);
powerDisplay.innerText = power;
autoDisplay.innerText = auto;

document.getElementById('buy-power').innerText =
`Улучшить клик (+1) — Цена: ${Math.floor(powerPrice)}`;

document.getElementById('buy-auto').innerText =
`Купить Автоклик (+1/сек) — Цена: ${Math.floor(autoPrice)}`;

const dataToSave = {
score,
power,
auto,
powerPrice,
autoPrice
};

localStorage.setItem(userKey, JSON.stringify(dataToSave));
}

function renderLeaderboard() {

leaderboardDiv.innerHTML = '<h1>Leaderboard:</h1>';

let allPlayers = [];

for (let i = 0; i < localStorage.length; i++) {

let key = localStorage.key(i);

if (key.startsWith('clicker_data_')) {

let name = key.replace('clicker_data_', '');
let data = JSON.parse(localStorage.getItem(key));

allPlayers.push({
name: name,
score: data.score
});
}
}

allPlayers.sort((a, b) => b.score - a.score);

allPlayers.slice(0, 10).forEach((player, index) => {

const item = document.createElement('div');

if (player.name === currentUser) {
item.style.color = "gold";
item.style.fontWeight = "bold";
}

item.innerHTML =
`${index + 1}. ${player.name} — ${Math.floor(player.score)}`;

leaderboardDiv.appendChild(item);
});
}

function logout() {
localStorage.removeItem('currentUser');
window.location.href = 'login.html';
}

document.getElementById("logout-btn").onclick = logout;

document.getElementById('btn-main').addEventListener('click', () => {

score += power;

updateUI();

});

document.getElementById('buy-power').addEventListener('click', () => {

if (score >= powerPrice) {

score -= powerPrice;

power += 1;

powerPrice = Math.floor(powerPrice * 1.5);

updateUI();

} else {

alert("Недостаточно кликов!");

}

});

document.getElementById('buy-auto').addEventListener('click', () => {

if (score >= autoPrice) {

score -= autoPrice;

auto += 1;

autoPrice = Math.floor(autoPrice * 1.5);

updateUI();

} else {

alert("Недостаточно кликов!");

}

});

setInterval(() => {

if (auto > 0) {

score += auto;

updateUI();

}

}, 1000);

setInterval(renderLeaderboard, 3000);

updateUI();
renderLeaderboard();
</script>

</body>
</html>
